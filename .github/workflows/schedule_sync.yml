name: Run Tado-Octopus Script

on:
  workflow_dispatch:
  schedule:
    # Runs every Wednesday at 12pm UTC
    - cron: '0 0 * * *'

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Initialise playwright
      run: |
        playwright install

    - name: Run Python script
      run: |
        python sync_octopus_tado.py \
          --tado-email "$TADO_EMAIL" \
          --tado-password "$TADO_PASSWORD" \
          --mprn "$OCTOPUS_MPRN" \
          --gas-serial-number "$OCTOPUS_GAS_SERIAL" \
          --octopus-api-key "$OCTOPUS_API_KEY" \
          --octopus-account-number "$OCTOPUS_ACCOUNT_NUMBER" \
          --update-tariff
